name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify repository docs
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CODEOWNERS
      - name: Basic secret-pattern scan (excluding workflow files)
        run: |
          if git grep -I -n -E 'AKIA[0-9A-Z]{16}|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----' -- . ':!.github/workflows/*'; then
            echo "Potential secret pattern found"
            exit 1
          fi
